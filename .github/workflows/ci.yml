name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_ENV: test
  DB_HOST: localhost
  DB_PORT: 5432
  DB_NAME: jack_ai_test
  DB_USER: postgres
  DB_PASSWORD: postgres
  REDIS_HOST: localhost
  REDIS_PORT: 6379
  JWT_SECRET: ci-test-jwt-secret-minimum-32-chars-long

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jack_ai_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install root dependencies
        run: npm install

      - name: Run linting
        run: |
          echo "Linting frontend..."
          cd frontend && npm install && npm run lint
          cd .. && npm run lint

      - name: Run unit tests (conversation, ai-nlp, job-matching, user-profile)
        run: |
          for service in conversation ai-nlp job-matching user-profile; do
            echo "== Testing services/$service =="
            cd "services/$service"
            npm install
            if [ "$service" = "user-profile" ]; then
              npm run init:db
            fi
            npm test
            cd ../..
          done

      - name: Build services
        run: |
          for service in user-profile conversation ai-nlp job-matching email report; do
            echo "Building services/$service..."
            cd "services/$service"
            npm install
            npm run build
            cd ../..
          done

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

  smoke-test:
    runs-on: ubuntu-latest
    needs: test

    env:
      DB_NAME: jack_ai

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jack_ai
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install root dependencies
        run: npm install

      - name: Create CI env file
        run: |
          cat > .env.ci <<'EOF'
          NODE_ENV=development
          DB_HOST=localhost
          DB_PORT=5432
          DB_NAME=jack_ai
          DB_USER=postgres
          DB_PASSWORD=postgres
          DB_SSL=false
          REDIS_HOST=localhost
          REDIS_PORT=6379
          JWT_SECRET=ci-test-jwt-secret-minimum-32-chars-long
          CORS_ORIGIN=http://localhost:3000
          AI_SERVICE_URL=http://localhost:3003
          AI_NLP_SERVICE_URL=http://localhost:3003
          USER_PROFILE_SERVICE_URL=http://localhost:3001
          CONVERSATION_SERVICE_URL=http://localhost:3002
          JOB_MATCHING_SERVICE_URL=http://localhost:3004
          REPORT_SERVICE_URL=http://localhost:3007
          EOF

      - name: Build smoke services
        run: |
          for service in user-profile conversation ai-nlp job-matching report; do
            echo "Building services/$service..."
            cd "services/$service"
            npm install
            npm run build
            cd ../..
          done

      - name: Setup test database
        run: |
          set -a
          source .env.ci
          set +a
          cd services/user-profile && npm run init:db
          cd ../job-matching && npm run init:db

      - name: Start services for smoke test
        run: |
          mkdir -p .runlogs/ci
          source_repo() {
            set -a
            # shellcheck disable=SC1091
            source "$GITHUB_WORKSPACE/.env.ci"
            set +a
          }

          start_service() {
            local name="$1"
            local port="$2"
            local rel_dir="$3"
            source_repo
            export PORT="$port"
            (
              cd "$GITHUB_WORKSPACE/$rel_dir"
              npm start
            ) > "$GITHUB_WORKSPACE/.runlogs/ci/$name.log" 2>&1 &
            echo $! > "$GITHUB_WORKSPACE/.runlogs/ci/$name.pid"
            echo "Started $name on port $port (pid $(cat "$GITHUB_WORKSPACE/.runlogs/ci/$name.pid"))"
          }

          start_service user-profile 3001 services/user-profile
          start_service conversation 3002 services/conversation
          start_service ai-nlp 3003 services/ai-nlp
          start_service job-matching 3004 services/job-matching
          start_service report 3007 services/report

      - name: Wait for service health
        run: |
          wait_for() {
            local url="$1"
            local name="$2"
            for i in $(seq 1 30); do
              if curl -sf "$url" >/dev/null; then
                echo "OK $name"
                return 0
              fi
              sleep 2
            done
            echo "FAILED $name — last logs:"
            return 1
          }

          wait_for http://localhost:3001/health user-profile
          wait_for http://localhost:3003/health ai-nlp
          wait_for http://localhost:3002/health conversation
          wait_for http://localhost:3004/health job-matching
          wait_for http://localhost:3007/health report

      - name: Run MVP0 smoke (light)
        run: |
          EMAIL="smoke-ci-${GITHUB_RUN_ID}@example.com"
          PASSWORD="smoke-ci-test-password"

          curl -sf -X POST http://localhost:3001/api/users/register \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"$EMAIL\",\"password\":\"$PASSWORD\",\"first_name\":\"Smoke\",\"last_name\":\"CI\"}"

          TOKEN="$(curl -sf -X POST http://localhost:3001/api/users/login \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"$EMAIL\",\"password\":\"$PASSWORD\"}" \
            | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{const j=JSON.parse(d);process.stdout.write(j.token||'');})")"

          if [[ -z "$TOKEN" ]]; then
            echo "Failed to obtain smoke test token"
            exit 1
          fi

          TOKEN="$TOKEN" SMOKE_MODE=light bash ./scripts/smoke/mvp0-smoke.sh

      - name: Upload service logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-service-logs
          path: .runlogs/ci/
          if-no-files-found: ignore
