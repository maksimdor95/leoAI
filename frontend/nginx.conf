events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression - EXCLUDE application/json from request compression
    # JSON requests should not be compressed to prevent corruption
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/atom+xml;
    # Note: application/json is intentionally excluded to prevent request body corruption

    server {
        listen 8080;
        server_name localhost;

        # Internal Yandex Cloud resolver
        resolver 127.0.0.1 valid=30s;

        root /usr/share/nginx/html;
        index index.html;

        # NOTE: Security headers are handled by backend services
        # We don't add them here to avoid duplication which causes 403 errors

        # API proxy to gateway - preserve request body correctly
        location /api/ {
            proxy_pass ${API_URL}/api/;
            
            # Critical: Preserve request body and headers
            # Nginx automatically passes Content-Type and Content-Length from original request
            proxy_set_header Host $proxy_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            
            # Explicitly preserve Content-Type and Content-Length if present
            proxy_set_header Content-Type $http_content_type;
            proxy_set_header Content-Length $http_content_length;
            
            # Pass X-Auth-Token for Yandex Serverless (bypasses IAM Authorization validation)
            proxy_set_header X-Auth-Token $http_x_auth_token;
            
            # Don't buffer request body - pass it through immediately to prevent JSON corruption
            proxy_request_buffering off;
            
            # Increase timeouts for slow requests
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            proxy_ssl_server_name on;
        }

        # WebSocket proxy - NO extra headers, just proxy through
        location /socket.io {
            proxy_pass ${API_URL};
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $proxy_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
        }

        # Static files - security headers only here
        location / {
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "no-referrer-when-downgrade" always;
            add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'; connect-src 'self' http: https: ws: wss: ${API_URL}" always;
            try_files $uri $uri/ /index.html;
        }

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Health check
        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            deny all;
        }
    }
}



