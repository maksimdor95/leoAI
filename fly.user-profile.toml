# Fly.io configuration for User Profile Service
app = "jack-user-profile"
primary_region = "fra"

[build]
  image = "ghcr.io/your-username/jack-ai/user-profile:main"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  DB_HOST = "your-db-host"
  DB_PORT = "5432"
  DB_NAME = "jack_ai"
  DB_USER = "jack_user"
  DB_PASSWORD = "your-db-password"
  JWT_SECRET = "your-jwt-secret"

[[services]]
  internal_port = 8080
  protocol = "tcp"

  [services.concurrency]
    type = "requests"
    soft_limit = 100
    hard_limit = 200

[[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

[[services.ports]]
    port = 443
    handlers = ["tls", "http"]
    force_https = true

[services.http_checks]
  interval = 10000
  timeout = 2000
  grace_period = "30s"
  restart_limit = 0
  method = "get"
  path = "/health"



