<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Jack Conversation Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
    />
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #f5f7fb;
        color: #1f2a37;
        margin: 0;
        padding: 24px;
      }

      .container {
        max-width: 640px;
        margin: 0 auto;
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
        padding: 24px 28px;
      }

      h1 {
        margin-top: 0;
        font-size: 24px;
        font-weight: 600;
      }

      .section {
        margin-bottom: 24px;
      }

      label {
        display: block;
        margin-bottom: 6px;
        font-size: 14px;
        font-weight: 600;
      }

      input,
      textarea {
        width: 100%;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #d0d7e2;
        background: #f9fbff;
        font-size: 14px;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }

      input:focus,
      textarea:focus {
        outline: none;
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
      }

      button {
        border: none;
        border-radius: 10px;
        padding: 10px 16px;
        background: #2563eb;
        color: white;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s ease;
      }

      button:disabled {
        background: #94a3b8;
        cursor: not-allowed;
      }

      #log {
        background: #0f172a;
        color: #e2e8f0;
        border-radius: 12px;
        padding: 16px;
        height: 200px;
        overflow-y: auto;
        font-family: 'JetBrains Mono', 'Fira Code', monospace;
        font-size: 13px;
        line-height: 1.5;
      }

      .log-entry {
        margin-bottom: 10px;
      }

      .log-entry span {
        display: block;
      }

      .log-entry .timestamp {
        font-size: 11px;
        color: #94a3b8;
      }

      .row {
        display: flex;
        gap: 12px;
      }

      .row > * {
        flex: 1;
      }

      .small-input {
        width: auto;
      }

      .inline {
        display: flex;
        gap: 12px;
        align-items: center;
      }

      .info-box {
        background: #eff6ff;
        border-radius: 12px;
        padding: 12px 16px;
        margin-bottom: 16px;
        font-size: 13px;
        line-height: 1.5;
        color: #1d4ed8;
      }

      .info-box code {
        background: rgba(29, 78, 216, 0.12);
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Jack Conversation Test</h1>

      <div class="info-box">
        <p>
          1. Авторизуйся на фронте <code>http://localhost:3000</code> (нажми "Начать поиск работы" и войди в систему).<br />
          2. Открой DevTools → Application → Local Storage → запись <code>jack_token</code>.<br />
          3. Скопируй значение токена и вставь его ниже.
        </p>
      </div>

      <div class="section">
        <label for="token">JWT токен пользователя</label>
        <input
          type="text"
          id="token"
          placeholder="Вставь токен (jack_token)"
          autocomplete="off"
        />
      </div>

      <div class="section inline">
        <div>
          <label for="serviceUrl">URL Conversation Service</label>
          <input
            type="text"
            id="serviceUrl"
            value="http://localhost:3002"
            class="small-input"
          />
        </div>
        <button id="connectBtn">Подключиться</button>
        <button id="disconnectBtn" disabled>Отключиться</button>
      </div>

      <div class="section">
        <label for="message">Сообщение Jack</label>
        <div class="inline">
          <input type="text" id="message" placeholder="Например: Привет!" />
          <button id="sendBtn" disabled>Отправить</button>
        </div>
      </div>

      <div class="section">
        <label>Лог</label>
        <div id="log"></div>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const connectBtn = document.getElementById('connectBtn');
      const disconnectBtn = document.getElementById('disconnectBtn');
      const sendBtn = document.getElementById('sendBtn');
      const tokenInput = document.getElementById('token');
      const urlInput = document.getElementById('serviceUrl');
      const messageInput = document.getElementById('message');
      const logBox = document.getElementById('log');

      let socket = null;

      function log(message, data) {
        const entry = document.createElement('div');
        entry.className = 'log-entry';

        const timestamp = document.createElement('span');
        timestamp.className = 'timestamp';
        timestamp.textContent = new Date().toLocaleTimeString();

        const text = document.createElement('span');
        text.textContent = message;

        entry.appendChild(timestamp);
        entry.appendChild(text);

        if (data) {
          const pre = document.createElement('pre');
          pre.textContent = JSON.stringify(data, null, 2);
          entry.appendChild(pre);
        }

        logBox.appendChild(entry);
        logBox.scrollTop = logBox.scrollHeight;
      }

      connectBtn.addEventListener('click', () => {
        const token = tokenInput.value.trim();
        if (!token) {
          alert('Сначала вставь JWT токен пользователя.');
          return;
        }

        const url = urlInput.value.trim();
        socket = io(url, {
          transports: ['websocket'],
          auth: { token },
        });

        socket.on('connect', () => {
          log('✅ Подключено к Conversation Service');
          connectBtn.disabled = true;
          disconnectBtn.disabled = false;
          sendBtn.disabled = false;
        });

        socket.on('session:joined', (payload) => {
          log('🆔 Подключена сессия', payload);
        });

        socket.on('session:history', (payload) => {
          log('📜 История сообщений', payload);
        });

        socket.on('message:received', (payload) => {
          log('💬 Новое сообщение', payload);
        });

        socket.on('error', (payload) => {
          log('⚠️ Ошибка', payload);
        });

        socket.on('disconnect', () => {
          log('❌ Соединение закрыто');
          connectBtn.disabled = false;
          disconnectBtn.disabled = true;
          sendBtn.disabled = true;
        });

        socket.on('connect_error', (error) => {
          log('❌ Ошибка подключения', { message: error.message });
        });
      });

      disconnectBtn.addEventListener('click', () => {
        if (socket) {
          socket.disconnect();
          socket = null;
          connectBtn.disabled = false;
          disconnectBtn.disabled = true;
          sendBtn.disabled = true;
        }
      });

      sendBtn.addEventListener('click', () => {
        const text = messageInput.value.trim();
        if (!text || !socket) {
          return;
        }

        socket.emit('message:send', { content: text });
        log('📤 Отправлено сообщение', { content: text });
        messageInput.value = '';
      });
    </script>
  </body>
</html>
