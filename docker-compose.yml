services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: jack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-jack_ai}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - jack-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: jack-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    networks:
      - jack-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # Resume Parser (pdfplumber fallback)
  resume-parser:
    build:
      context: ./services/resume-parser
      dockerfile: Dockerfile
    container_name: jack-resume-parser
    restart: unless-stopped
    ports:
      - '${RESUME_PARSER_PORT:-3011}:3011'
    networks:
      - jack-network
    healthcheck:
      test: ['CMD', 'python', '-c', "import urllib.request; urllib.request.urlopen('http://localhost:3011/health')"]
      interval: 20s
      timeout: 5s
      retries: 3

  # pgAdmin (опционально, для управления базой данных)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: jack-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@jack.ai}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - '${PGADMIN_PORT:-5050}:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - jack-network
    depends_on:
      - postgres
    profiles:
      - tools # Запускается только с флагом --profile tools

  # API Gateway
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: jack-gateway
    restart: unless-stopped
    ports:
      - '${GATEWAY_PORT:-8080}:80'
    networks:
      - jack-network
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    profiles:
      - gateway # Запускается только с флагом --profile gateway

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  jack-network:
    driver: bridge
