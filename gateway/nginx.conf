# API Gateway Configuration for Jack MVP
worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    sendfile        on;
    keepalive_timeout 65;

    # Internal Yandex Cloud resolver
    resolver 127.0.0.1 valid=30s;
    resolver_timeout 5s;

    # Timeouts to handle slow backend/db starts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    server {
        listen 8080;
        
        # Health check
        location /health {
            add_header Content-Type application/json;
            return 200 '{"status": "ok", "service": "gateway"}';
        }

        # NOTE: CORS is handled by backend services, not by Gateway
        # This prevents duplicate CORS headers which cause 403 errors

        # API routes
        location /api/users/ {
            proxy_pass ${USER_PROFILE_SERVICE_URL}/api/users/;
            
            # Preserve request body correctly
            proxy_set_header Host $proxy_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Content-Type $content_type;
            proxy_set_header Content-Length $content_length;
            
            # Don't buffer request body to prevent JSON corruption
            proxy_request_buffering off;
            
            proxy_ssl_server_name on;
        }

        location /api/conversations/ {
            proxy_pass ${CONVERSATION_SERVICE_URL}/api/conversations/;
            proxy_set_header Host $proxy_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Pass X-Auth-Token for Yandex Serverless (bypasses IAM validation)
            proxy_set_header X-Auth-Token $http_x_auth_token;
            proxy_ssl_server_name on;
        }

        # REST Chat API (serverless-compatible alternative to Socket.io)
        location /api/chat/ {
            proxy_pass ${CONVERSATION_SERVICE_URL}/api/chat/;
            proxy_set_header Host $proxy_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Content-Type $content_type;
            proxy_set_header Content-Length $content_length;
            # Pass X-Auth-Token for Yandex Serverless (bypasses IAM validation)
            proxy_set_header X-Auth-Token $http_x_auth_token;
            
            # Don't buffer request body to prevent JSON corruption
            proxy_request_buffering off;
            
            # Longer timeout for AI processing
            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            
            proxy_ssl_server_name on;
        }

        location /socket.io {
            proxy_pass ${CONVERSATION_SERVICE_URL};
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $proxy_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
        }

        location /api/ai/ {
            proxy_pass ${AI_NLP_SERVICE_URL}/api/ai/;
            proxy_set_header Host $proxy_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
        }

        location /api/jobs/ {
            proxy_pass ${JOB_MATCHING_SERVICE_URL}/api/jobs/;
            proxy_set_header Host $proxy_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
        }

        location /api/email/ {
            proxy_pass ${EMAIL_SERVICE_URL}/api/email/;
            proxy_set_header Host $proxy_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
        }
    }
}
